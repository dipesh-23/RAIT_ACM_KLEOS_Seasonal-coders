name: asha_triage
description: ASHA voice-based clinical triage assistant (Flutter frontend).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Speech recognition

  # Text-to-speech
  flutter_tts: ^3.8.5

  # Audio playback
  audioplayers: ^5.2.1

  # UI and Formatting
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.3.3

  # New features
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  fl_chart: ^0.66.2
  pdf: ^3.11.0
  printing: ^5.12.0
  share_plus: ^7.2.1

  # Local Database & Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # Machine Learning (Offline Inference)
  tflite_flutter: ^0.12.1

  # Wakelock & Speech
  wakelock_plus: ^1.1.4
  record: 5.0.4
  speech_to_text: ^7.4.0
  vosk_flutter: ^0.3.48
  shelf: ^1.4.2
  network_info_plus: ^7.0.0
  open_filex: ^4.7.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  http: ^1.2.0
  permission_handler: ^11.3.0
  # record_linux 0.7.2 (pulled by record 5.0.4) is missing startStream which
  # is required by record_platform_interface 1.6.0. Override to 1.3.1 which
  # has startStream. This only affects Linux desktop builds; Android is unaffected.
  record_linux: 1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/model/
    - assets/anchors/
    - assets/vosk/
