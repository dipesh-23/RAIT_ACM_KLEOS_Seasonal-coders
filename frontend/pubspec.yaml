name: asha_triage
description: ASHA voice-based clinical triage assistant (Flutter frontend).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Speech recognition
  speech_to_text: ^7.4.0

  # Text-to-speech
  flutter_tts: ^3.8.5

  # Audio playback
  audioplayers: ^5.2.1

  # UI and Formatting
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.3.3

  # PDF & Sharing
  pdf: ^3.11.0
  share_plus: ^7.2.1

  # Extra screens (dashboard, QR, charts)
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  fl_chart: ^0.66.2
  printing: ^5.12.0

  # Local Database & Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # Wakelock & Audio recording
  wakelock_plus: ^1.1.4
  record: ^6.2.1
  shelf: ^1.4.2
  network_info_plus: ^7.0.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/model/
    - assets/anchors/
